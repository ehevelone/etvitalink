[build]
  publish = "public"
  command = "echo 'No frontend build step needed'"

[functions]
  directory = "functions"
  node_bundler = "esbuild"
  # ✅ Include all Node dependencies your functions use
  external_node_modules = [
    "pg",
    "nodemailer",
    "qrcode",
    "bcryptjs",
    "sharp"
  ]

[build.environment]
  NODE_VERSION = "20"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "587"
  SMTP_USER = "ehevelone@gmail.com"
  # 🚨 Do NOT put SMTP_PASS here — keep it in Netlify Environment Variables
