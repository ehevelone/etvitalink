workflows:
  android-release:
    name: Android Release Build
    environment:
      flutter: stable
      vars:
        ANDROID_BUILD_TYPE: release
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - ehevelone@gmail.com
